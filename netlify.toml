# netlify.toml

[build]
  command = "npm run build"
  publish = "build"

# Важно! Обработка SPA маршрутизации
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Заголовки для кэширования
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"